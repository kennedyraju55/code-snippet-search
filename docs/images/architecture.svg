<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#06d6a0"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Input -->
  <rect x="30" y="65" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="100" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#06d6a0" text-anchor="middle">🔍 Search Query</text>
  <text x="100" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Natural language</text>

  <rect x="30" y="135" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="100" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#06d6a0" text-anchor="middle">📁 Target Directory</text>
  <text x="100" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Code files to search</text>

  <line x1="170" y1="92" x2="210" y2="92" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="162" x2="210" y2="162" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Scanner -->
  <rect x="215" y="125" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📂 Dir Scanner</text>
  <text x="275" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Read + hash files</text>

  <line x1="335" y1="152" x2="375" y2="152" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Ranking -->
  <rect x="380" y="65" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📊 Relevance</text>
  <text x="440" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Keyword scoring</text>

  <rect x="380" y="125" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔗 Context Builder</text>
  <text x="440" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">max_chars context</text>

  <line x1="275" y1="92" x2="380" y2="92" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="120" x2="440" y2="125" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="152" x2="540" y2="152" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="545" y="120" width="170" height="65" rx="10" fill="#1a1e2e" stroke="#06d6a0" stroke-width="2"/>
  <text x="630" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#06d6a0" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="630" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Semantic search</text>

  <line x1="630" y1="185" x2="630" y2="225" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="540" y="230" width="180" height="55" rx="10" fill="#1a1e2e" stroke="#06d6a0" stroke-width="1.5"/>
  <text x="630" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#06d6a0" text-anchor="middle">📋 Search Results</text>
  <text x="630" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Files, lines, explanations</text>

  <line x1="630" y1="285" x2="630" y2="315" stroke="#06d6a0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Bookmarks -->
  <rect x="540" y="320" width="180" height="45" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="347" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔖 Bookmarks</text>

  <!-- Cache -->
  <rect x="215" y="220" width="120" height="45" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1" stroke-dasharray="4"/>
  <text x="275" y="247" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">💾 Index Cache</text>
  <line x1="275" y1="180" x2="275" y2="220" stroke="#30363d" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrowhead)"/>

  <rect x="30" y="350" width="740" height="35" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="373" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local • Semantic Search • File Caching • Bookmark Management</text>
</svg>
